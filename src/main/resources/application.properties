spring.application.name=lanchonete

# Banco de dados — configure via variáveis de ambiente em produção
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/lanchonete_db}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:senhauser}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false

# JWT
jwt.secret=${JWT_SECRET:dev-insecure-secret-mude-em-producao-32c}
jwt.expiration-ms=86400000

# Cookie seguro: false para HTTP local, true em produção (HTTPS)
app.cookie.secure=false

# Admin padrão — apenas usado no primeiro boot (DataSeeder)
app.admin.email=${ADMIN_EMAIL:admin@lanchonete.com}
app.admin.senha=${ADMIN_SENHA:admin123}
