<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Categorias - Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="admin-layout">
    <nav class="sidebar">
        <div class="sidebar-logo">🍔 Lanchonete</div>
        <a th:href="@{/admin/produtos}" class="sidebar-btn">Produtos</a>
        <a th:href="@{/admin/categorias}" class="sidebar-btn ativo">Categorias</a>
        <a th:href="@{/admin/usuarios}" class="sidebar-btn">Usuários</a>
        <a th:href="@{/admin/pedidos}" class="sidebar-btn">Pedidos</a>
        <form method="post" th:action="@{/sair}" style="margin-top: auto;">
            <button type="submit" class="sidebar-btn-sair">Sair</button>
        </form>
    </nav>

    <main class="painel">
        <div class="titulo">Gerenciar Categorias</div>

        <div th:if="${sucesso}" class="alerta alerta-ok" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="alerta alerta-erro" th:text="${erro}"></div>

        <form class="form-inline" method="post" th:action="@{/admin/categorias/adicionar}">
            <div class="campo-grupo">
                <label>Nome da Categoria</label>
                <input name="nome" type="text" class="campo" placeholder="Nome" required>
            </div>
            <button type="submit" class="botao-adicionar" style="align-self: flex-end;">Adicionar</button>
        </form>

        <div class="tabela-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${categorias}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.nome}"></td>
                        <td style="display: flex; gap: 6px;">
                            <button type="button" class="botao-atualizar"
                                    th:data-id="${c.id}"
                                    th:data-nome="${c.nome}"
                                    onclick="abrirEdicaoBtn(this)">
                                Editar
                            </button>
                            <form method="post" th:action="@{/admin/categorias/excluir}"
                                  onsubmit="return confirm('Excluir esta categoria?')">
                                <input type="hidden" name="id" th:value="${c.id}">
                                <button type="submit" class="botao-excluir">Excluir</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div id="modal-edicao" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:10px; padding:30px; width:340px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
        <div class="titulo" style="margin-bottom: 16px;">Editar Categoria</div>
        <form method="post" th:action="@{/admin/categorias/atualizar}">
            <input type="hidden" id="edit-id" name="id">
            <div class="campo-grupo">
                <label>Nome</label>
                <input id="edit-nome" name="nome" type="text" class="campo" required>
            </div>
            <div style="display: flex; gap: 8px; margin-top: 16px;">
                <button type="submit" class="botao-atualizar" style="flex:1; height:40px;">Atualizar</button>
                <button type="button" onclick="fecharModal()" class="botao-secundario" style="flex:1;">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
function abrirEdicaoBtn(btn) {
    document.getElementById('edit-id').value = btn.dataset.id;
    document.getElementById('edit-nome').value = btn.dataset.nome;
    document.getElementById('modal-edicao').style.display = 'flex';
}
function fecharModal() {
    document.getElementById('modal-edicao').style.display = 'none';
}
</script>
</body>
</html>
