<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Produtos - Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="admin-layout">
    <nav class="sidebar">
        <div class="sidebar-logo">🍔 Lanchonete</div>
        <a th:href="@{/admin/produtos}" class="sidebar-btn ativo">Produtos</a>
        <a th:href="@{/admin/categorias}" class="sidebar-btn">Categorias</a>
        <a th:href="@{/admin/usuarios}" class="sidebar-btn">Usuários</a>
        <a th:href="@{/admin/pedidos}" class="sidebar-btn">Pedidos</a>
        <form method="post" th:action="@{/sair}" style="margin-top: auto;">
            <button type="submit" class="sidebar-btn-sair">Sair</button>
        </form>
    </nav>

    <main class="painel">
        <div class="titulo">Gerenciar Produtos</div>

        <div th:if="${sucesso}" class="alerta alerta-ok" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="alerta alerta-erro" th:text="${erro}"></div>

        <!-- Formulário Adicionar -->
        <form class="form-inline" method="post" th:action="@{/admin/produtos/adicionar}">
            <div class="campo-grupo">
                <label>Nome</label>
                <input name="nome" type="text" class="campo" placeholder="Nome do produto" required>
            </div>
            <div class="campo-grupo">
                <label>Preço (R$)</label>
                <input name="preco" type="number" step="0.01" min="0" class="campo" placeholder="0,00" required>
            </div>
            <div class="campo-grupo">
                <label>Quantidade</label>
                <input name="quantidade" type="number" min="0" class="campo" placeholder="0" required>
            </div>
            <div class="campo-grupo">
                <label>Categoria</label>
                <select name="categoriaId" class="campo">
                    <option value="">Sem categoria</option>
                    <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nome}"></option>
                </select>
            </div>
            <button type="submit" class="botao-adicionar" style="align-self: flex-end;">Adicionar</button>
        </form>

        <!-- Tabela -->
        <div class="tabela-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                        <th>Categoria</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${produtos}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.nome}"></td>
                        <td th:text="|R$ ${#numbers.formatDecimal(p.preco, 1, 'COMMA', 2, 'POINT')}|"></td>
                        <td th:text="${p.quantidade}"></td>
                        <td th:text="${p.categoria != null ? p.categoria.nome : '-'}"></td>
                        <td style="display: flex; gap: 6px; flex-wrap: wrap;">
                            <!-- Modal embutido como dialog -->
                            <button type="button" class="botao-atualizar btn-editar"
                                    th:data-id="${p.id}"
                                    th:data-nome="${p.nome}"
                                    th:data-preco="${p.preco}"
                                    th:data-quantidade="${p.quantidade}"
                                    th:data-categoria="${p.categoria != null ? p.categoria.id : 0}"
                                    onclick="abrirEdicaoBtn(this)">
                                Editar
                            </button>
                            <form method="post" th:action="@{/admin/produtos/excluir}"
                                  onsubmit="return confirm('Excluir este produto?')">
                                <input type="hidden" name="id" th:value="${p.id}">
                                <button type="submit" class="botao-excluir">Excluir</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Modal de Edição -->
<div id="modal-edicao" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:10px; padding:30px; width:380px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
        <div class="titulo" style="margin-bottom: 16px;">Editar Produto</div>
        <form method="post" th:action="@{/admin/produtos/atualizar}">
            <input type="hidden" id="edit-id" name="id">
            <div class="campo-grupo">
                <label>Nome</label>
                <input id="edit-nome" name="nome" type="text" class="campo" required>
            </div>
            <div class="campo-grupo">
                <label>Preço (R$)</label>
                <input id="edit-preco" name="preco" type="number" step="0.01" min="0" class="campo" required>
            </div>
            <div class="campo-grupo">
                <label>Quantidade</label>
                <input id="edit-quantidade" name="quantidade" type="number" min="0" class="campo" required>
            </div>
            <div class="campo-grupo">
                <label>Categoria</label>
                <select id="edit-categoria" name="categoriaId" class="campo">
                    <option value="">Sem categoria</option>
                    <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nome}"></option>
                </select>
            </div>
            <div style="display: flex; gap: 8px; margin-top: 16px;">
                <button type="submit" class="botao-atualizar" style="flex:1; height:40px;">Atualizar</button>
                <button type="button" onclick="fecharModal()" class="botao-secundario" style="flex:1;">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
function abrirEdicaoBtn(btn) {
    document.getElementById('edit-id').value = btn.dataset.id;
    document.getElementById('edit-nome').value = btn.dataset.nome;
    document.getElementById('edit-preco').value = btn.dataset.preco;
    document.getElementById('edit-quantidade').value = btn.dataset.quantidade;
    document.getElementById('edit-categoria').value = btn.dataset.categoria || '';
    document.getElementById('modal-edicao').style.display = 'flex';
}
function fecharModal() {
    document.getElementById('modal-edicao').style.display = 'none';
}
</script>
</body>
</html>
