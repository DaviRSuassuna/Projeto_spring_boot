<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Usuários - Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="admin-layout">
    <nav class="sidebar">
        <div class="sidebar-logo">🍔 Lanchonete</div>
        <a th:href="@{/admin/produtos}" class="sidebar-btn">Produtos</a>
        <a th:href="@{/admin/categorias}" class="sidebar-btn">Categorias</a>
        <a th:href="@{/admin/usuarios}" class="sidebar-btn ativo">Usuários</a>
        <a th:href="@{/admin/pedidos}" class="sidebar-btn">Pedidos</a>
        <form method="post" th:action="@{/sair}" style="margin-top: auto;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="sidebar-btn-sair">Sair</button>
        </form>
    </nav>

    <main class="painel">
        <div class="titulo">Gerenciar Usuários</div>

        <div th:if="${sucesso}" class="alerta alerta-ok" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="alerta alerta-erro" th:text="${erro}"></div>

        <form class="form-inline" method="post" th:action="@{/admin/usuarios/adicionar}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="campo-grupo">
                <label>Nome</label>
                <input name="nome" type="text" class="campo" placeholder="Nome" required>
            </div>
            <div class="campo-grupo">
                <label>E-mail</label>
                <input name="email" type="email" class="campo" placeholder="email@email.com" required>
            </div>
            <div class="campo-grupo">
                <label>Senha</label>
                <input name="senha" type="password" class="campo" placeholder="••••••" required>
            </div>
            <div class="campo-grupo" style="align-self: flex-end; padding-bottom: 2px;">
                <label class="check-admin">
                    <input name="admin" type="checkbox" value="true"> Admin
                </label>
            </div>
            <button type="submit" class="botao-adicionar" style="align-self: flex-end;">Adicionar</button>
        </form>

        <div class="tabela-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Admin</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.id}"></td>
                        <td th:text="${u.nome}"></td>
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.admin ? 'Sim' : 'Não'}"></td>
                        <td style="display: flex; gap: 6px;">
                            <button type="button" class="botao-atualizar"
                                    th:data-id="${u.id}"
                                    th:data-nome="${u.nome}"
                                    th:data-email="${u.email}"
                                    th:data-admin="${u.admin}"
                                    onclick="abrirEdicaoBtn(this)">
                                Editar
                            </button>
                            <form method="post" th:action="@{/admin/usuarios/excluir}"
                                  onsubmit="return confirm('Excluir este usuário?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="id" th:value="${u.id}">
                                <button type="submit" class="botao-excluir">Excluir</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div id="modal-edicao" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:10px; padding:30px; width:380px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
        <div class="titulo" style="margin-bottom: 16px;">Editar Usuário</div>
        <form method="post" th:action="@{/admin/usuarios/atualizar}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" id="edit-id" name="id">
            <div class="campo-grupo">
                <label>Nome</label>
                <input id="edit-nome" name="nome" type="text" class="campo" required>
            </div>
            <div class="campo-grupo">
                <label>E-mail</label>
                <input id="edit-email" name="email" type="email" class="campo" required>
            </div>
            <div class="campo-grupo">
                <label>Nova Senha (deixe em branco para manter)</label>
                <input id="edit-senha" name="senha" type="password" class="campo" placeholder="••••••">
            </div>
            <div class="campo-grupo">
                <label class="check-admin">
                    <input id="edit-admin" name="admin" type="checkbox" value="true"> Admin
                </label>
            </div>
            <div style="display: flex; gap: 8px; margin-top: 16px;">
                <button type="submit" class="botao-atualizar" style="flex:1; height:40px;">Atualizar</button>
                <button type="button" onclick="fecharModal()" class="botao-secundario" style="flex:1;">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
function abrirEdicaoBtn(btn) {
    document.getElementById('edit-id').value = btn.dataset.id;
    document.getElementById('edit-nome').value = btn.dataset.nome;
    document.getElementById('edit-email').value = btn.dataset.email;
    document.getElementById('edit-admin').checked = btn.dataset.admin === 'true';
    document.getElementById('edit-senha').value = '';
    document.getElementById('modal-edicao').style.display = 'flex';
}
function fecharModal() {
    document.getElementById('modal-edicao').style.display = 'none';
}
</script>
</body>
</html>
